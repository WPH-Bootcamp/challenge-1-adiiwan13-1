<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge-1 Simple Landing Page with Html and CSS</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <!-- Logo dan nama perusahaan -->
    <header class="header">
      <div class="logo">
        <img src="assets/images/Aika.jpg" alt="Logo" />
        <h1>AiKA <span class="italic">Design</span></h1>
      </div>

      <nav class="nav">
        <a href="#">HOME</a>
        <a href="#">TENTANG KAMI</a>
        <a href="#">PRODUK DESAIN</a>
      </nav>
    </header>

    <!-- MAIN -->
    <!-- Hero Bagian Kiri -->
    <main class="hero">
      <div class="hero-left">
        <img src="assets/images/desain-rumah.jpg" alt="Desain Rumah" />
        <ul>
          <li>Desain & pembuatan rumah</li>
          <li>Desain & pembuatan interior</li>
          <li>Konsultasi desain</li>
        </ul>
      </div>

      <!-- Hero Bagian Kanan -->
      <div class="hero-right">
        <p class="subtitle">
          Mendambakan rumah yang indah dan nyaman adalah harapan semua orang.
        </p>

        <h2 class="title">
          Solusi desain <br />
          rumah dan interior
        </h2>
        <h2>Percayakan pada kami</h2>

        <button class="btn">Hubungi Kami</button>
      </div>
    </main>

    <!-- FOOTER -->
    <!-- Link Social Media -->
    <footer class="footer">
      <div class="footer-item">
        <img src="assets/images/instagram.jpg" alt="Instagram" />
        <span>@aika07</span>
      </div>

      <div class="footer-item">
        <img src="assets/images/facebook.jpg" alt="facebook" />
        <span>aika07</span>
      </div>
    </footer>
  </body>
</html>
